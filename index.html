<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blissea Oils</title>

<link rel="stylesheet" href="style.css">

<!-- Razorpay -->
<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
</head>

<body>

<header>
  <h2 class="logo">Blissea Oils</h2>
  <nav>
    <a href="#products">Shop</a>
    <a href="#">About</a>
    <a href="track.html">Track Order</a>
    <a href="#" onclick="toggleCart()">Cart (<span id="cart-count">0</span>)</a>
  </nav>
</header>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Feel Better. Naturally.</h1>
    <p>100% Natural Oils for Pain, Sleep & Hair Wellness</p>
    <button onclick="scrollToProducts()">Shop Now</button>
  </div>
  <img src="images/hero.jpg" class="hero-img">
</section>

<!-- PRODUCTS -->
<section id="products">
  <h2>Best Sellers</h2>

  <div class="product-grid">

    <div class="product">
      <img src="images/pain.jpg">
      <h3>Pain Relief Oil</h3>
      <p>₹499</p>
      <button onclick="addToCart('Pain Relief Oil', 499)">Add</button>
    </div>

    <div class="product">
      <img src="images/sleep.jpg">
      <h3>Stress Sleep Roll-on</h3>
      <p>₹399</p>
      <button onclick="addToCart('Stress Sleep Roll-on', 399)">Add</button>
    </div>

    <div class="product">
      <img src="images/menhair.jpg">
      <h3>Men Hair Growth Oil</h3>
      <p>₹599</p>
      <button onclick="addToCart('Men Hair Growth Oil', 599)">Add</button>
    </div>

  </div>
</section>

<!-- CART DRAWER -->
<div id="cart" class="cart">
  <h3>Your Cart</h3>
  <ul id="cart-items"></ul>
  <p>Total: ₹<span id="cart-total">0</span></p>
  <button onclick="payNow()" class="checkout">Pay Now</button>
</div>

<script src="script.js"></script>

</body>
</html>
