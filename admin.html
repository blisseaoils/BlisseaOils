<!DOCTYPE html>
<html>
<head>
<title>Admin Panel - Blissea Oils</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: Arial;
  padding: 20px;
  background: #f5f5f5;
}

h1 {
  text-align: center;
}

.order {
  background: white;
  padding: 15px;
  margin: 10px 0;
  border-radius: 10px;
}

button {
  padding: 8px;
  margin-top: 5px;
  border: none;
  background: #5c7c5c;
  color: white;
  cursor: pointer;
}
</style>

</head>

<body>

<h1>Admin Panel</h1>

<div id="orders"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore.js"></script>

<script>
const firebaseConfig = {
  apiKey: "YOUR_KEY",
  authDomain: "YOUR_DOMAIN",
  projectId: "YOUR_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function loadOrders() {
  const container = document.getElementById("orders");
  container.innerHTML = "";

  db.collection("orders").orderBy("date", "desc").get().then(snapshot => {
    snapshot.forEach(doc => {
      let data = doc.data();

      container.innerHTML += `
        <div class="order">
          <h3>Order ID: ${doc.id}</h3>
          <p><b>Name:</b> ${data.name}</p>
          <p><b>Phone:</b> ${data.phone}</p>
          <p><b>Total:</b> ₹${data.total}</p>
          <p><b>Status:</b> ${data.status}</p>

          <button onclick="updateStatus('${doc.id}','Shipped')">Mark Shipped</button>
          <button onclick="updateStatus('${doc.id}','Delivered')">Mark Delivered</button>
        </div>
      `;
    });
  });
}

function updateStatus(id, status) {
  db.collection("orders").doc(id).update({
    status: status
  }).then(() => {
    alert("Updated!");
    loadOrders();
  });
}

loadOrders();
</script>

</body>
</html>
